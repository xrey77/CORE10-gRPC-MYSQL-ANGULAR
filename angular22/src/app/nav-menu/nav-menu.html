<nav class="bg-slate-900 text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="flex items-center justify-between h-16 w-full px-4">
      
        <div class="flex">
            <a routerLink="/" class="text-xl font-bold tracking-wider text-indigo-400">BrandLogo</a>

        <div class="hidden md:flex space-x-4">
            <a routerLink="/aboutus" 
            routerLinkActive="bg-slate-800 text-yellow-200" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-800 transition">About Us</a>

            <div class="relative" (click)="toggleDropdown($event)">
                <button routerLinkActive="bg-slate-800 text-yellow-200" class="px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white inline-flex items-center">
                Products
                <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>            
                </button>

            @if (isDesktopOpen()) {
                <div class="absolute right-0 mt-2 w-48 bg-slate-800 rounded-md shadow-lg py-1 z-50">
                <a routerLink="/productlist" routerLinkActive="bg-slate-800 text-yellow-200" class="block px-4 py-2 text-sm hover:bg-slate-700">Products List</a>
                <a routerLink="/productsearch"routerLinkActive="bg-slate-800 text-yellow-200" class="block px-4 py-2 text-sm hover:bg-slate-700">Products SEarch</a>
                </div>
            }
        </div>
        </div>

        <a routerLink="/contactus" routerLinkActive="bg-slate-800 text-yellow-200" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-800 transition">Contact</a>
        </div>

        <div class="hidden md:flex space-x-2">
            <a id="openModalBtn" (click)="loginHandler($event)" routerLink="/#" routerLinkActive="bg-slate-800 text-indigo-400" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-800 transition">Login</a>
            <a (click)="registerHandler($event)" routerLink="/#" routerLinkActive="bg-slate-800 text-indigo-400" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-slate-800 transition">Register</a>
        </div>

        <div class="flex md:hidden">
            <button (click)="toggleDrawer()" type="button" class="inline-flex items-center justify-center p-2 rounded-md text-slate-400 hover:text-white hover:bg-slate-800 focus:outline-none" aria-controls="mobile-menu" [aria-expanded]="isDesktopOpen()">
            <span class="sr-only">Open main menu</span>
            @if (!isDesktopOpen()) {
                <svg class="block h-6 w-6" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            } @else {
                <svg class="block h-6 w-6" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            }
            </button>
        </div>

    </div>
  </div>


@if (isDrawerOpen()) {
<div class="fixed inset-0 z-50 overflow-hidden pointer-events-none">
  
  <div class="absolute inset-0 bg-black/50 pointer-events-auto transition-opacity">

  </div>

  <div class="absolute inset-y-0 right-0 w-64 bg-white shadow-xl transition-transform duration-300 ease-in-out pointer-events-auto translate-x-0">
      
    <div class="flex justify-end p-4">
        <button (click)="closeDrawer()" class="text-black hover:text-gray-600 focus:outline-none">
          <svg  class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
    </div>
      <hr class="border-t border-gray-200" />        

      <a routerLink="/aboutus" class="block w-full px-4 py-3 text-base font-medium text-gray-800 hover:bg-gray-100">About Us</a>
      <hr class="border-t border-gray-200" />        
      
      <div class="relative w-full" (click)="toggleMobileDropdown($event)">
          <button class="w-full px-4 py-3 text-base font-medium text-gray-800 hover:bg-gray-100 inline-flex items-center justify-between">
            Products
            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>            
          </button>

          @if (isMobileOpen()) {
              <div class="absolute -full top-10 mr-2 w-48 bg-gray-100 rounded-md shadow-lg py-1 z-50 border border-gray-200">
                  <a routerLink="/productlist" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Products List</a>
                  <a routerLink="/productsearch" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Products Search</a>
              </div>
          }
      </div>      
      <hr class="border-t border-gray-200" />        
      <a routerLink="/contactus" class="block w-full px-4 py-3 text-base font-medium text-gray-800 hover:bg-gray-100">Contact Us</a>
      <hr class="border-t border-gray-200" />        
      <a (click)="loginHandler($event)" routerLink="/#" class="block w-full px-4 py-3 text-base font-medium text-gray-800 hover:bg-gray-100">Login</a>
      <hr class="border-t border-gray-200" />        
      <a  (click)="registerHandler($event)" class="block w-full px-4 py-3 text-base font-medium text-gray-800 hover:bg-gray-100">Register</a>
      <hr class="border-t border-gray-200" />        

  </div>
</div>

}
</nav>
@if (isLoginModalOpen() == true) {
    <app-login></app-login>
}

@if (isRegisterModalOpen() == true) {
    <app-register></app-register>
}
