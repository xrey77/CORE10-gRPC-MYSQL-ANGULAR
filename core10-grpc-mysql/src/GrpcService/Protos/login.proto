syntax = "proto3";

option csharp_namespace = "core10_grpc_mysql.Protos"; 

package user;

service LoginService {
  rpc LoginUser (RegisterRequest) returns (RegisterResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  int32 user_id = 1;
  string firstname = 2;
  string lastname = 3;
  string email = 4;
  string mobile = 5;
  string username = 6;
  bool is_active = 7;
  bool is_blocked = 8;
  int3 mailtoken = 9;
  string userpic = 10;
  string qrcodeurl = 11;
  string text_content = 12;
}
