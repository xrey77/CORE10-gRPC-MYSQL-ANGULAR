syntax = "proto3";

option csharp_namespace = "core10_grpc_mysql.Protos"; 

package user;

service UserService {
  rpc GetUserById (GetUserRequest) returns (GetUserResponse);
  rpc GetAllUsers (GetAllUsersRequest) returns (GetAllUsersResponse);
}

message GetUserRequest {
  int32 user_id = 1;
}

message GetUserResponse {
  int32 user_id = 1;
  string firstname = 2;
  string lastname = 3;
  string email = 3;
  string mobile = 4;
  string username = 5;
  bool is_active = 6;
  bool is_blocked = 7;
  int32 mailtoken = 8;
  string userpic = 9;
  string qrcodeurl = 10; 
}


message GetAllUsersRequest {}
message GetAllUsersResponse {
  int32 user_id = 1;
  string firstname = 2;
  string lastname = 3;
  string email = 3;
  string mobile = 4;
  string username = 5;
  bool is_active = 6;
  bool is_blocked = 7;
  int32 mailtoken = 8;
  string userpic = 9;
  string qrcodeurl = 10; 
}