syntax = "proto3";

option csharp_namespace = "core10_grpc_mysql.Protos"; 

package user;

service RegisterService {
  rpc CreateUser (RegisterRequest) returns (RegisterResponse);
}

message RegisterRequest {
  string firstname = 1;
  string lastname = 2;
  string email = 3;
  string mobile = 4;
  string username = 5;
  string password = 6;
}

message RegisterResponse {
  int32 user_id = 1;
  string text_content = 2;
}
