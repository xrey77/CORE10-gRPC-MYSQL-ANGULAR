syntax = "proto3";

option csharp_namespace = "core10_grpc_mysql"; 

package product;

service Product {
  rpc ProductList (ProductListRequest) returns (ProductListResponse);
  rpc ProductSearch (ProductSearchRequest) returns (ProductSearchResponse);
  rpc ProductReport (ProductReportRequest) returns (ProductReportResponse);  
  rpc GetCategoryProducts (CategoryRequest) returns (CategoryResponse);
}

message ProductData {
  int32 id = 1;
  string descriptions = 2;
  int32 qty = 3;
  string unit = 4;
  double costprice = 5;
  double sellprice = 6;
}

message ProductListRequest {
  int32 page = 1;
}

message ProductListResponse {
  int32 page = 1;
  int32 total_page = 2;
  int32 total_records = 3;
  repeated ProductData data = 4;
}


message ProductSearchRequest {
    int32 page = 1;
    string keyword = 2;
}

message ProductSearchResponse {
  int32 page = 1;
  int32 total_page = 2;
  int32 total_records = 3;
  repeated ProductData data = 4;
}

message ProductReportRequest {}
message ProductReportResponse {
  repeated ProductData data = 1;
}

message DataProduct {
  int32 id = 1;
  string descriptions = 2;
  int32 qty = 3;
  string unit = 4;
  double costprice = 5;
  double sellprice = 6;
  int32 category_id = 7;
}

message CategoryWithProducts {
  string category_name = 1;
  repeated DataProduct products = 2; 
}

message CategoryModel {
  int32 id = 1;
  string name = 2;
}
message CategoryRequest {}

message CategoryResponse {
  repeated CategoryWithProducts categories = 1;
}

